<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Student Sign In')}"></head>
<body>
<div class="login-page">
    <div class="login-box animate-in">

        <!-- Logo -->
        <div class="login-logo">
            <div class="login-logo-brand">SmartCampus</div>
            <div class="login-logo-title">Student Sign In</div>
            <p class="login-logo-sub">Sign in to access your dashboard</p>
        </div>

        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <!-- Form -->
        <form th:action="@{/student/login}" method="post">
            <div class="form-group">
                <label for="studentName">Full Name</label>
                <input type="text" id="studentName" name="studentName"
                       required autofocus placeholder="e.g. Narendra A"
                       autocomplete="name"/>
            </div>

            <div class="form-group">
                <label for="studentEmail">University Email</label>
                <input type="email" id="studentEmail" name="studentEmail"
                       required placeholder="yourname@university.edu"
                       autocomplete="email"/>
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg" style="margin-top:4px;">
                Sign In
            </button>
        </form>

        <hr class="divider">

        <div style="text-align:center;">
            <p style="color:var(--text-muted); font-size:0.8125rem; margin-bottom:12px;">
                Just browsing events?
            </p>
            <a href="/" class="btn btn-outline btn-block">Browse Events</a>
        </div>

        <div style="text-align:center; margin-top:16px;">
            <a href="/login" class="action-link" style="font-size:0.8125rem;">
                Admin? Sign in here &rarr;
            </a>
        </div>
    </div>
</div>

<!-- Footer credits -->
<div style="position:fixed; bottom:16px; width:100%; text-align:center; z-index:10; pointer-events:none;">
    <span style="font-size:0.75rem; color:var(--text-muted);">
        Narendra A &nbsp;|&nbsp; VTU: vtu25917
    </span>
</div>

<th:block th:replace="~{layout :: scripts}"></th:block>
</body>
</html>
