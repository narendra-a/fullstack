<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Discussion Forum')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>

<div class="container" style="max-width:800px; margin:40px auto;">

    <!-- Header -->
    <div style="margin-bottom:1.5rem;">
        <a th:href="@{'/events/' + ${event.id}}" class="btn btn-outline" style="font-size:0.85rem; margin-bottom:1rem;">← Back to Event</a>
        <h1 style="font-size:1.8rem; font-weight:700;" th:text="${event.name} + ' — Discussion'">Event Forum</h1>
        <p class="text-muted">
            💬 <span th:text="${postCount}">0</span> posts
            &nbsp;|&nbsp; 📅 <span th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy')}">Date</span>
        </p>
    </div>

    <!-- Flash messages -->
    <div th:if="${successMessage}" class="alert alert-success" style="margin-bottom:1rem;">
        ✅ <span th:text="${successMessage}"></span>
    </div>
    <div th:if="${errorMessage}" class="alert alert-error" style="margin-bottom:1rem;">
        ❌ <span th:text="${errorMessage}"></span>
    </div>

    <!-- New Post Form -->
    <div class="card" style="padding:1.5rem; margin-bottom:1.5rem;">
        <h2 style="font-size:1rem; font-weight:700; margin-bottom:1rem;">✍️ Post a Question or Comment</h2>
        <div th:if="${studentEmail == null}" style="color:var(--text-muted);">
            <a href="/student/login" style="color:#6366f1; font-weight:600;">Sign in</a> to participate in the discussion.
        </div>
        <form th:if="${studentEmail != null}" th:action="@{'/events/' + ${event.id} + '/discussion'}" method="post">
            <textarea name="content" rows="3"
                      placeholder="Ask a question, share your thoughts..."
                      style="width:100%; resize:vertical; margin-bottom:0.75rem;"
                      required></textarea>
            <input type="hidden" name="parentId" value="">
            <button type="submit" class="btn btn-primary">Post 💬</button>
        </form>
    </div>

    <!-- Discussion Threads -->
    <div th:if="${#lists.isEmpty(threads)}" class="card" style="padding:3rem; text-align:center;">
        <div style="font-size:2.5rem; margin-bottom:0.75rem;">💬</div>
        <p class="text-muted">No posts yet. Start the conversation!</p>
    </div>

    <div th:if="${!#lists.isEmpty(threads)}" style="display:grid; gap:1rem;" id="discussionContainer">
        <div th:each="post : ${threads}" class="card thread-card" style="padding:1.25rem;">
            <!-- Top-level post -->
            <div style="display:flex; gap:1rem; align-items:flex-start; margin-bottom:0.75rem;">
                <div style="width:38px; height:38px; border-radius:50%; background:linear-gradient(135deg,#6366f1,#8b5cf6);
                     display:flex; align-items:center; justify-content:center; color:white; font-weight:700; flex-shrink:0;"
                     th:text="${#strings.substring(post.authorName ?: 'A',0,1)}">A</div>
                <div style="flex:1;">
                    <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
                        <div>
                            <strong th:text="${post.authorName ?: 'Anonymous'}">Name</strong>
                            <span class="text-muted" style="font-size:0.75rem; margin-left:0.5rem;"
                                  th:text="${#temporals.format(post.createdAt, 'dd MMM HH:mm')}">Time</span>
                        </div>
                        <!-- Admin delete -->
                        <form th:action="@{'/admin/discussion/' + ${post.id} + '/delete'}" method="post"
                              sec:authorize="hasRole('ADMIN')" style="display:inline;">
                            <input type="hidden" name="eventId" th:value="${event.id}">
                            <button type="submit" class="btn btn-sm" style="font-size:0.75rem; color:#dc2626; background:none; border:1px solid #dc2626; padding:0.2rem 0.5rem;"
                                    onclick="return confirm('Delete this post?')">🗑 Delete</button>
                        </form>
                    </div>
                    <p style="margin:0.5rem 0 0; color:var(--text-secondary); line-height:1.5;"
                       th:text="${post.content}">Content</p>
                </div>
            </div>

            <!-- Replies -->
            <div th:if="${!#lists.isEmpty(post.replies)}"
                 style="margin-left:2.75rem; border-left:2px solid var(--border-color,#e5e7eb); padding-left:1rem; margin-top:0.75rem;">
                <div th:each="reply : ${post.replies}"
                     style="display:flex; gap:0.75rem; align-items:flex-start; margin-bottom:0.75rem;">
                    <div style="width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#10b981,#059669);
                         display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.8rem; flex-shrink:0;"
                         th:text="${#strings.substring(reply.authorName ?: 'A',0,1)}">A</div>
                    <div style="flex:1;">
                        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
                            <div>
                                <strong style="font-size:0.9rem;" th:text="${reply.authorName ?: 'Anonymous'}">Name</strong>
                                <span class="text-muted" style="font-size:0.72rem; margin-left:0.5rem;"
                                      th:text="${#temporals.format(reply.createdAt, 'dd MMM HH:mm')}">Time</span>
                            </div>
                            <form th:action="@{'/admin/discussion/' + ${reply.id} + '/delete'}" method="post"
                                  sec:authorize="hasRole('ADMIN')" style="display:inline;">
                                <input type="hidden" name="eventId" th:value="${event.id}">
                                <button type="submit" class="btn btn-sm" style="font-size:0.72rem; color:#dc2626; background:none; border:1px solid #dc2626; padding:0.15rem 0.4rem;"
                                        onclick="return confirm('Delete reply?')">🗑</button>
                            </form>
                        </div>
                        <p style="margin:0.4rem 0 0; font-size:0.9rem; color:var(--text-secondary);" th:text="${reply.content}">Reply</p>
                    </div>
                </div>
            </div>

            <!-- Reply form -->
            <div th:if="${studentEmail != null}" style="margin-left:2.75rem; margin-top:0.75rem;">
                <button class="btn btn-ghost btn-sm" onclick="toggleReply(this)"
                        style="font-size:0.8rem; padding:0.2rem 0.6rem;">↩ Reply</button>
                <form th:action="@{'/events/' + ${event.id} + '/discussion'}" method="post"
                      class="reply-form" style="display:none; margin-top:0.5rem;">
                    <input type="hidden" name="parentId" th:value="${post.id}">
                    <textarea name="content" rows="2"
                              placeholder="Write a reply..."
                              style="width:100%; resize:none; font-size:0.9rem;"
                              required></textarea>
                    <div style="display:flex; gap:0.5rem; margin-top:0.4rem;">
                        <button type="submit" class="btn btn-primary btn-sm" style="font-size:0.8rem;">Reply</button>
                        <button type="button" class="btn btn-ghost btn-sm" style="font-size:0.8rem;" onclick="toggleReply(this.closest('form').previousElementSibling)">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>
<script th:replace="~{layout :: scripts}"></script>
<script>
    function toggleReply(btn) {
        const form = btn.nextElementSibling;
        if (form && form.classList.contains('reply-form')) {
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }
    }
</script>
</body>
</html>
