spring.application.name=event-management

# ─────────────────────────────────────────────
# MySQL Database Configuration
# ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/smart_campus_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ─────────────────────────────────────────────
# Hibernate
# ─────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#
# ─────────────────────────────────────────────
# Spring Security (Admin credentials)
# ─────────────────────────────────────────────
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# ─────────────────────────────────────────────
# Email (JavaMail - Gmail SMTP)
# Replace with your Gmail address and App Password
# To get an App Password: Google Account → Security → 2-Step Verification → App passwords
# ─────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ─────────────────────────────────────────────
# Logging
# ─────────────────────────────────────────────
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.com.smartcampus=DEBUG
